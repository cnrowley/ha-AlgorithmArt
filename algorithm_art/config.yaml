name: "AlgorithmArt Generator"
description: "Runs DLA, Fractal (fractalgen), and Goban art generators for the PhotopainterArt integration."
version: "1.0.0"
slug: "algorithm_art"
init: false
arch:
  - aarch64
  - amd64
  - armv7

map:
  - data

ports:
  8765/tcp: 8765

ports_description:
  8765/tcp: "Generator API (called by the photopainter_art HACS integration)"

options:
  port: 8765
  dla_cmd: "dla.x"
  fractal_cmd: "fractalgen.x"
  goban_cmd: "goban.x"
  display_width: 600
  display_height: 448

schema:
  port: int
  dla_cmd: str
  fractal_cmd: str
  goban_cmd: str
  display_width: int
  display_height: int
